<!DOCTYPE html>
<html>
<head>
    <title>GlowGuide Recommendations</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <div class="header">
        <h1>GlowGuide Beauty App</h1>
        <button onclick="openCart()">View Cart (<span id="cart-count">0</span>)</button>
    </div>

    <div class="container">
        <!-- left side form -->
        <div class="form-section">
            <h2>Find Your Match</h2>
            
            <p>What do you want to buy?</p>
            <select id="category">
                <option value="foundation">Foundation</option>
                <option value="blush">Blush</option>
                <option value="eyeshadow">Eyeshadow Palette</option>
                <option value="lipstick">Lipstick</option>
            </select>

            <p>Skin Tone:</p>
            <select id="skinTone">
                <option value="fair">Fair/Light</option>
                <option value="medium">Medium</option>
                <option value="tan">Tan/Olive</option>
                <option value="deep">Deep</option>
            </select>

            <p>Skin Type:</p>
            <select id="skinType">
                <option value="normal">Normal</option>
                <option value="dry">Dry</option>
                <option value="oily">Oily</option>
                <option value="combination">Combination</option>
            </select>

            <p>Skin Condition:</p>
            <select id="skinCondition">
                <option value="none">None/Normal</option>
                <option value="acne">Acne</option>
                <option value="aging">Aging</option>
                <option value="redness">Redness</option>
                <option value="pigmentation">Pigmentation</option>
            </select>

            <p>Sensitive Skin?</p>
            <select id="sensitivity">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>

            <br><br>
            <button class="search-btn" onclick="getRecommendations()">Get Recommendations</button>
        </div>

        <!-- right side results -->
        <div class="results-section">
            <h2>Recommended Products:</h2>
            <div id="products">
                <p>Please select your options on the left and click "Get Recommendations" to see products.</p>
            </div>
        </div>
    </div>

    <!-- Very simple cart popup window inside a div -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2>Your Shopping Cart</h2>
            <hr>
            <div id="cart-items"></div>
            <hr>
            <h3>Total Amount: $<span id="total">0.00</span></h3>
            <button onclick="closeCart()">Close Cart</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
